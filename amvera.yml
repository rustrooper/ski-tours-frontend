meta:
  environment: nodejs
  version: '22'
  build-tool: pnpm@10.15.0

build:
  skip: false
  additionalCommands:
    - node --version
    - pnpm --version
    - NODE_OPTIONS=--max-old-space-size=2048 pnpm run build
    - ls -la .next/standalone
    - cp -r public .next/standalone/
    - cp -r .next/static .next/standalone/.next/
  artifacts:
    .next/standalone: /

run:
  persistenceMount: /data
  command: cd .next/standalone && PORT=80 node server.js
  containerPort: 80
  servicePort: 80
