<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Sanek Tours — Landing Design</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f0eee9;
        height: 100%;
      }
      body {
        font-family: 'Manrope', system-ui, sans-serif;
      }

      /* Force scrollbars hidden inside artboards so they look like static frames */
      .st-root::-webkit-scrollbar {
        display: none;
      }
      .st-root {
        scrollbar-width: none;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="components.jsx"></script>
    <script type="text/babel" src="desktop.jsx"></script>
    <script type="text/babel" src="mobile.jsx"></script>
    <script type="text/babel" src="system.jsx"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useEffect } = React;

      function App() {
        return (
          <DesignCanvas>
            <DCSection
              id="desktop"
              title="Desktop · 1440"
              subtitle="Полная одностраничная композиция — header, hero, направления, о нас, отзывы, CTA, footer."
            >
              <DCArtboard id="d-full" label="Sanek Tours · full page" width={1440} height={4380}>
                <Desktop />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="mobile"
              title="Mobile · 390"
              subtitle="Ключевые состояния под 375–414px: hero, бургер, направления, CTA, о нас."
            >
              <DCArtboard id="m-hero" label="01 · Hero (closed nav)" width={390} height={844}>
                <MobileHero />
              </DCArtboard>
              <DCArtboard id="m-burger" label="02 · Burger menu open" width={390} height={844}>
                <MobileBurger />
              </DCArtboard>
              <DCArtboard id="m-dest" label="03 · Направления (stack)" width={390} height={1080}>
                <MobileDest />
              </DCArtboard>
              <DCArtboard id="m-about" label="04 · О нас (stacked)" width={390} height={1100}>
                <MobileAbout />
              </DCArtboard>
              <DCArtboard id="m-cta" label="05 · CTA form" width={390} height={844}>
                <MobileCTA />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="system"
              title="Design System"
              subtitle="Tokens · type scale · components · animations. Готово к переносу в Tailwind + shadcn/ui."
            >
              <DCArtboard id="sys" label="Tokens & components" width={1440} height={2280}>
                <System />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
